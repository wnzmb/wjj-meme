        // 表情包(静图)
        const memeStaticFiles = [
            'static-test.jpg'
        ];

        // 表情包(动图)
        const memeDynamicFiles = [
            'dynamic-test.gif'
        ];

        function getAllItems(filter) {
            const items = [];
            if (filter === 'all' || filter === 'wallpaper') {
                for (const [name, files] of Object.entries(categories)) {
                    files.forEach(file => {
                        items.push({ src: `images/wallpaper/${file}`, category: 'wallpaper' });
                    });
                }
            }
            if (filter === 'all' || filter === 'meme-static') {
                memeStaticFiles.forEach(file => {
                    items.push({ src: `images/meme/${file}`, category: 'meme-static' });
                });
            }
            if (filter === 'all' || filter === 'meme-dynamic') {
                memeDynamicFiles.forEach(file => {
                    items.push({ src: `images/meme/${file}`, category: 'meme-dynamic' });
                });
            }
            return items;
        }

        function createItem(item) {
            const div = document.createElement('div');
            div.className = 'item';
            div.dataset.category = item.category;
            div.innerHTML = `
                <img src="${item.src}" alt="${item.category}" loading="lazy">
                <a href="${item.src}" download class="download-btn">下载</a>
            `;
            return div;
        }

        function renderBatch() {
            const end = Math.min(displayedCount + BATCH_SIZE, allItems.length);
            for (let i = displayedCount; i < end; i++) {
                gallery.appendChild(createItem(allItems[i]));
            }
            displayedCount = end;
            shownEl.textContent = displayedCount;

            if (displayedCount >= allItems.length) {
                loadMoreEl.style.display = 'none';
            } else {
                loadMoreEl.style.display = 'block';
            }
        }

        function initGallery(filter) {
            currentFilter = filter;
            allItems = getAllItems(filter);
            gallery.innerHTML = '';
            displayedCount = 0;
            countEl.textContent = allItems.length;
            loadingEl.style.display = 'none';
            renderBatch();
        }

        // 筛选按钮
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initGallery(btn.dataset.category);
            });
        });

        // 加载更多按钮
        loadMoreBtn.addEventListener('click', () => {
            renderBatch();
        });

        // 初始化
        initGallery('all');
    </script>
