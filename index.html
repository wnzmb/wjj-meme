<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Collection | WJJ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://blog.wjjblog.ccwu.cc/favicon.svg">
</head>
<body>
    <header>
        <h1>Meme Collection</h1>
        <p class="subtitle">WJJ 的表情包收集地</p>
        <a href="https://wjjblog.ccwu.cc" class="back-link">← 返回主站</a>
    </header>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="static">静态</button>
        <button class="filter-btn" data-filter="gif">动图</button>
    </div>

    <div class="masonry" id="gallery">
        <!-- 添加表情包格式：
        静态图: <div class="item" data-type="static"><img src="images/文件.jpg" alt="描述"><a href="images/文件.jpg" download class="download-btn">下载</a></div>
        动图: <div class="item" data-type="gif"><img src="images/文件.gif" alt="描述"><a href="images/文件.gif" download class="download-btn">下载</a></div>
        -->
        <div class="item" data-type="static">
            <img src="images/meme1.jpg" alt="表情包1">
            <a href="images/meme1.jpg" download class="download-btn">下载</a>
        </div>
        <div class="item" data-type="static">
            <img src="images/meme2.jpg" alt="表情包2">
            <a href="images/meme2.jpg" download class="download-btn">下载</a>
        </div>
        <div class="item" data-type="static">
            <img src="images/meme3.jpg" alt="表情包3">
            <a href="images/meme3.jpg" download class="download-btn">下载</a>
        </div>
    </div>

    <footer>
        <p>Total: <span id="count">0</span> memes</p>
    </footer>

    <script>
        document.getElementById('count').textContent = 
            document.querySelectorAll('.item img').length;

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                document.querySelectorAll('.item').forEach(item => {
                    if (filter === 'all' || item.dataset.type === filter) {
                        item.style.display = '';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
